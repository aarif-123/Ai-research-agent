services:
  - type: web
    name: verity-ai-api
    runtime: node
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: cd server && npm ci && npm run build
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: NEWSAPI_API_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false

  - type: web
    name: verity-ai
    runtime: static
    branch: main
    autoDeploy: true
    buildCommand: cd client && npm ci && npm run build
    staticPublishPath: ./client/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: verity-ai-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
